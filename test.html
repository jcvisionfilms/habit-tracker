<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker Tests</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #f1f5f9; padding: 24px; }
    h1 { margin-bottom: 16px; }
    pre { line-height: 1.7; font-size: 14px; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .summary { margin-top: 16px; font-size: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Habit Tracker Tests</h1>
  <pre id="output"></pre>
  <div class="summary" id="summary"></div>

  <script>
    let passed = 0;
    let failed = 0;
    const out = document.getElementById('output');

    function assert(description, actual, expected) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      const span = document.createElement('span');
      span.className = ok ? 'pass' : 'fail';
      span.textContent = ok
        ? `✓ ${description}\n`
        : `✗ ${description}\n  Expected: ${JSON.stringify(expected)}\n  Got:      ${JSON.stringify(actual)}\n`;
      out.appendChild(span);
      ok ? passed++ : failed++;
    }

    function section(name) {
      const el = document.createElement('span');
      el.textContent = `\n— ${name} —\n`;
      el.style.color = '#94a3b8';
      out.appendChild(el);
    }

    // ── Pure functions under test ────────────────────────────────────────────
    function getToday() {
      return new Date().toLocaleDateString('en-CA');
    }

    function loadHabits() {
      try {
        return JSON.parse(localStorage.getItem('habits') || '[]');
      } catch {
        return [];
      }
    }

    function saveHabits(habits) {
      localStorage.setItem('habits', JSON.stringify(habits));
    }

    function calcStreak(habit, today = getToday()) {
      const dates = new Set(habit.completedDates);
      let streak = 0;
      const cursor = new Date(today + 'T00:00:00');

      if (!dates.has(today)) {
        cursor.setDate(cursor.getDate() - 1);
      }

      while (true) {
        const d = cursor.toLocaleDateString('en-CA');
        if (dates.has(d)) {
          streak++;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }

      return streak;
    }

    function calcOverall(habit, today = getToday()) {
      const [sy, sm, sd] = habit.createdDate.split('-').map(Number);
      const [ey, em, ed] = today.split('-').map(Number);
      const start = Date.UTC(sy, sm - 1, sd);
      const end = Date.UTC(ey, em - 1, ed);
      const possible = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
      return {
        completed: habit.completedDates.length,
        possible
      };
    }

    function getWeekDates(today = getToday()) {
      const cursor = new Date(today + 'T00:00:00');
      const dow = cursor.getDay();
      const daysFromMonday = (dow === 0) ? 6 : dow - 1;
      cursor.setDate(cursor.getDate() - daysFromMonday);
      const dates = [];
      for (let i = 0; i < 7; i++) {
        dates.push(cursor.toLocaleDateString('en-CA'));
        cursor.setDate(cursor.getDate() + 1);
      }
      return dates;
    }

    function getDayColor(habits, dateStr, today = getToday()) {
      if (dateStr > today) return 'future';
      const activeHabits = habits.filter(h => h.createdDate <= dateStr);
      if (activeHabits.length === 0) return 'none';
      const done = activeHabits.filter(h => h.completedDates.includes(dateStr)).length;
      if (done === 0) return 'none';
      if (done === activeHabits.length) return 'all';
      return 'some';
    }

    function generateCompletedDates(startDate, totalDone, streak, today = getToday()) {
      if (totalDone === 0) return [];

      const streakDates = [];
      const cur = new Date(today + 'T00:00:00');
      for (let i = 0; i < streak; i++) {
        streakDates.unshift(cur.toLocaleDateString('en-CA'));
        cur.setDate(cur.getDate() - 1);
      }
      if (streak === 0) {
        cur.setDate(cur.getDate() - 1);
      }

      const pool = [];
      const poolCursor = new Date(startDate + 'T00:00:00');
      while (poolCursor <= cur) {
        pool.push(poolCursor.toLocaleDateString('en-CA'));
        poolCursor.setDate(poolCursor.getDate() + 1);
      }

      const extra = pool.slice(0, totalDone - streak);
      return [...extra, ...streakDates].sort();
    }

    function validateProgress(startDate, totalDone, streak, today = getToday()) {
      if (!startDate) return 'Please enter a start date';
      if (startDate > today) return "Start date can't be in the future";
      if (totalDone < 0 || streak < 0) return 'Values must be 0 or greater';
      if (streak > totalDone) return "Streak can't be more than total days done";
      const [sy, sm, sd] = startDate.split('-').map(Number);
      const [ey, em, ed] = today.split('-').map(Number);
      const daysSinceStart = Math.floor(
        (Date.UTC(ey, em - 1, ed) - Date.UTC(sy, sm - 1, sd)) / (1000 * 60 * 60 * 24)
      ) + 1;
      if (totalDone > daysSinceStart) return `Total days done can't exceed days since start (${daysSinceStart})`;
      return null;
    }


    // ── Tests ────────────────────────────────────────────────────────────────
    section('getToday');
    const today = getToday();
    assert('returns a string', typeof today, 'string');
    assert('format is YYYY-MM-DD (length 10)', today.length, 10);
    assert('contains dashes at positions 4 and 7', today[4] + today[7], '--');
    assert('year is 2026', today.slice(0, 4), '2026');

    section('loadHabits / saveHabits');
    localStorage.removeItem('habits');
    assert('returns empty array when nothing saved', loadHabits(), []);

    const sample = [{ id: 'a1', name: 'Test', createdDate: '2026-06-01', completedDates: [] }];
    saveHabits(sample);
    assert('round-trips a habit array', loadHabits(), sample);

    localStorage.setItem('habits', 'not valid json{{');
    assert('returns empty array on corrupt data', loadHabits(), []);

    localStorage.removeItem('habits');

    section('calcStreak');

    assert('streak is 0 with no completed dates', calcStreak(
      { completedDates: [] },
      '2026-06-08'
    ), 0);

    assert('streak is 1 when only today is done', calcStreak(
      { completedDates: ['2026-06-08'] },
      '2026-06-08'
    ), 1);

    assert('streak is 3 for three consecutive days ending today', calcStreak(
      { completedDates: ['2026-06-06', '2026-06-07', '2026-06-08'] },
      '2026-06-08'
    ), 3);

    assert('streak is 2 when today not done but yesterday and day before are', calcStreak(
      { completedDates: ['2026-06-06', '2026-06-07'] },
      '2026-06-08'
    ), 2);

    assert('streak resets after a gap', calcStreak(
      { completedDates: ['2026-06-01', '2026-06-07', '2026-06-08'] },
      '2026-06-08'
    ), 2);

    assert('streak is 0 when last done was 2 days ago', calcStreak(
      { completedDates: ['2026-06-06'] },
      '2026-06-08'
    ), 0);

    section('calcOverall');

    assert('1 possible on the day habit was created', calcOverall(
      { createdDate: '2026-06-08', completedDates: [] },
      '2026-06-08'
    ), { completed: 0, possible: 1 });

    assert('21 possible after 21 days', calcOverall(
      { createdDate: '2026-05-18', completedDates: [] },
      '2026-06-07'
    ), { completed: 0, possible: 21 });

    assert('17/21 matches example from spec', calcOverall(
      {
        createdDate: '2026-05-18',
        completedDates: ['2026-05-18','2026-05-19','2026-05-20','2026-05-21','2026-05-22',
                         '2026-05-24','2026-05-25','2026-05-26','2026-05-27','2026-05-28',
                         '2026-05-29','2026-05-31','2026-06-01','2026-06-02','2026-06-03',
                         '2026-06-04','2026-06-05']
      },
      '2026-06-07'
    ), { completed: 17, possible: 21 });

    section('getWeekDates');

    assert('returns 7 dates', getWeekDates('2026-06-03').length, 7);

    assert('Wednesday → week starts on Monday', getWeekDates('2026-06-03')[0], '2026-06-01');

    assert('Wednesday → week ends on Sunday', getWeekDates('2026-06-03')[6], '2026-06-07');

    assert('Monday → first element is itself', getWeekDates('2026-06-01')[0], '2026-06-01');

    assert('Monday → last element is Sunday', getWeekDates('2026-06-01')[6], '2026-06-07');

    assert('Sunday → week starts 6 days prior', getWeekDates('2026-06-07')[0], '2026-06-01');

    assert('Sunday → last element is itself', getWeekDates('2026-06-07')[6], '2026-06-07');

    section('getDayColor');

    const habitsForColor = [
      { createdDate: '2026-05-01', completedDates: ['2026-06-01', '2026-06-02'] },
      { createdDate: '2026-05-01', completedDates: ['2026-06-01'] }
    ];

    assert('future date returns future', getDayColor(habitsForColor, '2026-12-31', '2026-06-09'), 'future');

    assert('no habits returns none', getDayColor([], '2026-06-01', '2026-06-09'), 'none');

    assert('all habits done returns all', getDayColor(habitsForColor, '2026-06-01', '2026-06-09'), 'all');

    assert('some habits done returns some', getDayColor(habitsForColor, '2026-06-02', '2026-06-09'), 'some');

    assert('no habits done returns none', getDayColor(habitsForColor, '2026-06-03', '2026-06-09'), 'none');

    assert('today is not treated as future even when not completed', getDayColor(habitsForColor, '2026-06-09', '2026-06-09'), 'none');

    section('generateCompletedDates');

    assert('returns empty array when totalDone=0',
      generateCompletedDates('2026-06-01', 0, 0, '2026-06-10'), []);

    assert('returns streak dates only when totalDone equals streak',
      generateCompletedDates('2026-06-01', 3, 3, '2026-06-10'),
      ['2026-06-08', '2026-06-09', '2026-06-10']);

    assert('result length equals totalDone',
      generateCompletedDates('2026-05-20', 17, 4, '2026-06-10').length, 17);

    assert('last date in result is today when streak > 0',
      generateCompletedDates('2026-05-20', 5, 2, '2026-06-10').slice(-1)[0], '2026-06-10');

    assert('second-to-last date is yesterday when streak >= 2',
      generateCompletedDates('2026-05-20', 5, 2, '2026-06-10').slice(-2)[0], '2026-06-09');

    assert('today not in result when streak = 0',
      generateCompletedDates('2026-06-01', 3, 0, '2026-06-10').includes('2026-06-10'), false);

    assert('result is sorted ascending', (() => {
      const dates = generateCompletedDates('2026-05-20', 10, 3, '2026-06-10');
      return dates.join(',') === [...dates].sort().join(',');
    })(), true);

    section('validateProgress');

    assert('returns null for valid inputs',
      validateProgress('2026-05-20', 17, 4, '2026-06-10'), null);

    assert('returns null when totalDone=0 and streak=0',
      validateProgress('2026-06-01', 0, 0, '2026-06-10'), null);

    assert('returns error for future start date',
      validateProgress('2026-12-31', 0, 0, '2026-06-10'), "Start date can't be in the future");

    assert('returns error when streak > totalDone',
      validateProgress('2026-06-01', 3, 5, '2026-06-10'), "Streak can't be more than total days done");

    assert('returns error when totalDone > days since start',
      validateProgress('2026-06-09', 100, 0, '2026-06-10'), "Total days done can't exceed days since start (2)");

    assert('returns error for negative values',
      validateProgress('2026-06-01', -1, 0, '2026-06-10'), 'Values must be 0 or greater');

    assert('returns error for empty startDate',
      validateProgress('', 0, 0, '2026-06-10'), 'Please enter a start date');


    // ── Summary ──────────────────────────────────────────────────────────────
    document.getElementById('summary').textContent =
      `${passed} passed, ${failed} failed`;
    document.getElementById('summary').style.color = failed ? '#f87171' : '#4ade80';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .date {
      color: #64748b;
      font-size: 13px;
      margin-top: 3px;
    }

    .add-btn {
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: #22c55e;
    }

    .divider {
      height: 1px;
      background: #1e293b;
      margin: 16px 0;
    }

    .habit-row {
      background: #1e293b;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 3px solid #374151;
      margin-bottom: 10px;
      position: relative;
      transition: border-left-color 0.2s;
    }

    .habit-row.done {
      border-left-color: #4ade80;
    }

    .habit-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      cursor: pointer;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      background: #374151;
      border: 2px solid #475569;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    .checkbox.checked {
      background: #4ade80;
      border-color: #4ade80;
      color: #000;
      font-weight: 700;
    }

    .habit-name {
      font-size: 15px;
    }

    .habit-row.done .habit-name {
      color: #f1f5f9;
    }

    .habit-row:not(.done) .habit-name {
      color: #94a3b8;
    }

    .habit-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 17px;
      font-weight: 700;
    }

    .streak .stat-value {
      color: #f97316;
    }

    .overall .stat-value {
      color: #60a5fa;
    }

    .stat-label {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }

    .divider-v {
      width: 1px;
      height: 28px;
      background: #334155;
    }

    .menu-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 20px;
      padding: 0 4px;
      line-height: 1;
    }

    .menu-btn:hover {
      color: #94a3b8;
    }

    .menu {
      display: none;
      position: absolute;
      right: 12px;
      top: calc(100% + 4px);
      background: #1e3a5f;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px;
      z-index: 10;
      min-width: 110px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .menu button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #f1f5f9;
      cursor: pointer;
      padding: 7px 14px;
      font-size: 13px;
      text-align: left;
      border-radius: 5px;
    }

    .menu button:hover {
      background: #2d4a6f;
    }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: #475569;
      line-height: 2;
    }

    .footer {
      text-align: center;
      color: #475569;
      font-size: 13px;
      margin-top: 16px;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .modal-box h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f1f5f9;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }

    .modal-input:focus {
      border-color: #4ade80;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-primary {
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary:hover {
      background: #22c55e;
    }

    .btn-secondary {
      background: #374151;
      color: #94a3b8;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    /* ── Tabs ─────────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: #1e293b;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: #64748b;
      padding: 8px;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .tab.active {
      background: #334155;
      color: #f1f5f9;
      font-weight: 700;
    }

    /* ── Weekly view ──────────────────────────────────────────── */
    .week-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
      margin-bottom: 4px;
    }

    .week-row {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #1e293b;
      border-radius: 10px;
      padding: 10px 12px;
      border-left: 3px solid #334155;
      margin-bottom: 8px;
    }

    .week-name-col {
      width: 110px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .habit-name-week {
      font-size: 13px;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .week-day-label {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: #64748b;
    }

    .week-pct-col {
      width: 44px;
      flex-shrink: 0;
      text-align: center;
    }

    .week-pct-val {
      font-size: 13px;
      font-weight: 700;
    }

    .week-pct-sub {
      font-size: 10px;
      color: #64748b;
    }

    .day-sq {
      flex: 1;
      aspect-ratio: 1;
      background: #374151;
      border-radius: 4px;
    }

    .day-sq.done {
      background: #4ade80;
    }

    .day-sq.today-sq {
      outline: 2px solid #60a5fa;
      outline-offset: 1px;
    }

    /* ── Monthly view ─────────────────────────────────────────── */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .month-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .month-arrow {
      background: #1e293b;
      border: none;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      font-family: inherit;
    }

    .month-arrow:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .cal-grid-labels,
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-grid-labels {
      margin-bottom: 4px;
    }

    .cal-day-label {
      text-align: center;
      font-size: 10px;
      color: #64748b;
    }

    .cal-grid {
      margin-bottom: 12px;
    }

    .cal-day {
      background: #374151;
      border-radius: 6px;
      padding: 6px 0;
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }

    .cal-day.all {
      background: #4ade80;
      color: #000;
      font-weight: 700;
    }

    .cal-day.some {
      background: #facc15;
      color: #000;
      font-weight: 700;
    }

    .cal-day.future {
      background: #1e293b;
      color: #334155;
    }

    .cal-day.empty {
      background: transparent;
    }

    .cal-day.cal-today {
      outline: 2px solid #60a5fa;
      outline-offset: 1px;
    }

    .cal-legend {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #64748b;
    }

    .legend-sq {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: #374151;
      flex-shrink: 0;
    }

    .legend-sq.all  { background: #4ade80; }
    .legend-sq.some { background: #facc15; }
    .legend-sq.none { background: #374151; }
    .legend-sq.today-legend {
      background: transparent;
      outline: 2px solid #60a5fa;
      outline-offset: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Habit Tracker</h1>
        <div class="date" id="today-label"></div>
      </div>
      <button class="add-btn" onclick="showModal()">+ Add Habit</button>
    </header>

    <div class="divider"></div>

    <div class="tab-bar">
      <button class="tab active" data-view="today" onclick="switchView('today')">Today</button>
      <button class="tab" data-view="week" onclick="switchView('week')">Week</button>
      <button class="tab" data-view="month" onclick="switchView('month')">Month</button>
    </div>

    <div id="habit-list"></div>
    <div class="footer" id="footer"></div>
  </div>

  <!-- Add Habit Modal -->
  <div id="modal" onclick="if(event.target===this) hideModal()">
    <div class="modal-box">
      <h2>New Habit</h2>
      <input
        class="modal-input"
        id="habit-input"
        type="text"
        placeholder="e.g. Drink Water"
        onkeydown="if(event.key==='Enter') addHabit()"
      >
      <div class="modal-actions">
        <button class="btn-secondary" onclick="hideModal()">Cancel</button>
        <button class="btn-primary" onclick="addHabit()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let currentView = 'today';
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    // pure utils — added in Tasks 3–6
    function getToday() {
      return new Date().toLocaleDateString('en-CA');
    }

    function loadHabits() {
      try {
        return JSON.parse(localStorage.getItem('habits') || '[]');
      } catch {
        return [];
      }
    }

    function saveHabits(habits) {
      localStorage.setItem('habits', JSON.stringify(habits));
    }

    function calcStreak(habit, today = getToday()) {
      const dates = new Set(habit.completedDates);
      let streak = 0;
      const cursor = new Date(today + 'T00:00:00');

      if (!dates.has(today)) {
        cursor.setDate(cursor.getDate() - 1);
      }

      while (true) {
        const d = cursor.toLocaleDateString('en-CA');
        if (dates.has(d)) {
          streak++;
          cursor.setDate(cursor.getDate() - 1);
        } else {
          break;
        }
      }

      return streak;
    }

    function calcOverall(habit, today = getToday()) {
      const [sy, sm, sd] = habit.createdDate.split('-').map(Number);
      const [ey, em, ed] = today.split('-').map(Number);
      const start = Date.UTC(sy, sm - 1, sd);
      const end = Date.UTC(ey, em - 1, ed);
      const possible = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
      return {
        completed: habit.completedDates.length,
        possible
      };
    }
    // DOM functions — added in Tasks 7–10
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-view="${view}"]`).classList.add('active');
      renderCurrentView();
    }

    function renderCurrentView() {
      if (currentView === 'today') render();
      else if (currentView === 'week') renderWeekView();
      else renderMonthView();
    }

    function render() {
      const habits = loadHabits();
      const today = getToday();
      const list = document.getElementById('habit-list');
      const footer = document.getElementById('footer');

      document.getElementById('today-label').textContent =
        new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      if (habits.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <p>No habits yet.</p>
            <p>Click <strong>+ Add Habit</strong> to get started.</p>
          </div>
        `;
        footer.textContent = '';
        return;
      }

      const doneCount = habits.filter(h => h.completedDates.includes(today)).length;
      footer.textContent = `${doneCount} of ${habits.length} habits done today`;

      list.innerHTML = habits.map(habit => {
        const done = habit.completedDates.includes(today);
        const streak = calcStreak(habit);
        const { completed, possible } = calcOverall(habit);
        return `
          <div class="habit-row ${done ? 'done' : ''}" data-id="${habit.id}">
            <div class="habit-left" onclick="toggleComplete('${habit.id}')">
              <div class="checkbox ${done ? 'checked' : ''}">${done ? '✓' : ''}</div>
              <span class="habit-name">${escapeHtml(habit.name)}</span>
            </div>
            <div class="habit-right">
              <div class="stat streak">
                <div class="stat-value">🔥 ${streak}</div>
                <div class="stat-label">day streak</div>
              </div>
              <div class="divider-v"></div>
              <div class="stat overall">
                <div class="stat-value">${completed}/${possible}</div>
                <div class="stat-label">overall</div>
              </div>
              <button class="menu-btn" onclick="toggleMenu(event, '${habit.id}')">⋯</button>
              <div class="menu" id="menu-${habit.id}">
                <button onclick="startRename('${habit.id}')">Rename</button>
                <button onclick="deleteHabit('${habit.id}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleComplete(id) {
      const habits = loadHabits();
      const today = getToday();
      const habit = habits.find(h => h.id === id);
      if (!habit) return;

      const idx = habit.completedDates.indexOf(today);
      if (idx === -1) {
        habit.completedDates.push(today);
      } else {
        habit.completedDates.splice(idx, 1);
      }

      saveHabits(habits);
      render();
    }

    function showModal() {
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('habit-input').value = '';
      setTimeout(() => document.getElementById('habit-input').focus(), 50);
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function addHabit() {
      const input = document.getElementById('habit-input');
      const name = input.value.trim();
      if (!name) return;

      const habits = loadHabits();
      habits.push({
        id: Date.now().toString(36),
        name,
        createdDate: getToday(),
        completedDates: []
      });

      saveHabits(habits);
      hideModal();
      render();
    }

    function toggleMenu(event, id) {
      event.stopPropagation();
      const menu = document.getElementById(`menu-${id}`);
      const isOpen = menu.style.display === 'block';
      document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
      if (!isOpen) menu.style.display = 'block';
    }

    function deleteHabit(id) {
      if (!confirm('Delete this habit? This cannot be undone.')) return;
      const habits = loadHabits().filter(h => h.id !== id);
      saveHabits(habits);
      render();
    }

    function startRename(id) {
      const habits = loadHabits();
      const habit = habits.find(h => h.id === id);
      if (!habit) return;
      const newName = prompt('Rename habit:', habit.name);
      if (!newName || !newName.trim()) return;
      habit.name = newName.trim();
      saveHabits(habits);
      render();
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.menu-btn') && !e.target.closest('.menu')) {
        document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
      }
    });

    renderCurrentView();
  </script>
</body>
</html>
